<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - L'Atelier Botanique</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container" style="max-width: 600px">
      <h2 class="auth-title">Contactez-nous</h2>
      <p style="color: #666; font-style: italic; margin-bottom: 20px">
        Une question sur nos soins ? Écrivez-nous.
      </p>

      <form id="contactForm">
        <div class="auth-form-group">
          <label>Nom Complet</label>
          <input
            type="text"
            id="contactName"
            class="auth-input"
            placeholder="Votre nom"
            required
          />
        </div>

        <div class="auth-form-group">
          <label>Email</label>
          <input
            type="email"
            id="contactEmail"
            class="auth-input"
            placeholder="Votre email"
            required
          />
        </div>

        <div class="auth-form-group">
          <label>Sujet</label>
          <select class="auth-input" id="contactSubject">
            <option>Demande d'information</option>
            <option>Suivi de commande</option>
            <option>Partenariat</option>
          </select>
        </div>

        <div class="auth-form-group">
          <label>Message</label>
          <textarea
            id="contactMessage"
            class="auth-input"
            rows="5"
            placeholder="Votre message ici..."
            style="resize: none; font-family: sans-serif"
          ></textarea>
        </div>

        <button type="submit" class="auth-btn">Envoyer le message</button>
      </form>

      <p class="auth-switch">
        <a href="accueil3.html" class="auth-link">← Retour à l'accueil</a>
      </p>
    </div>

    <script src="../js/script.js"></script>
  </body>
</html>
