<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - L'Atelier Botanique</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page"> <div class="auth-container">
        <h2 class="auth-title">Login</h2>

        <form>
            <div class="auth-form-group">
                <label>Email</label>
                <input type="email" name="email" class="auth-input" placeholder="Enter email" required>
            </div>

            <div class="auth-form-group">
                <label>Password</label>
                <input type="password" name="password" class="auth-input" placeholder="Enter password" required>
            </div>

            <button type="submit" class="auth-btn">Login</button>
        </form>

        <p class="auth-switch">
            Pas de compte ? <a href="signup.html" class="auth-link">Sign Up</a>
        </p>
    </div>
<script src="../js/script.js"></script>
</body>
</html>
