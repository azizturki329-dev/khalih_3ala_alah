<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Khalih 3ala Allah</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <h2 class="title">Créer un compte</h2>
            <form class="form">
                
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input class="input-field" type="text" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input class="input-field" type="email" placeholder="Votre email" required>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <input class="input-field" type="password" placeholder="Créer un mot de passe" required>
                </div>

                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input class="input-field" type="password" placeholder="Confirmer" required>
                </div>

                <button class="btn" type="submit">S'inscrire</button>
            </form>

            <p class="switch-text">
                Déjà un compte ? 
                <a class="link" href="login.html">Login</a>
            </p>
        </div>
    </div>

</body>
</html>
